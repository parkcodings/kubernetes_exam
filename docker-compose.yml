services:
  postgres:
    image: postgres:16-alpine
    container_name: exam-postgres
    environment:
      POSTGRES_DB: examdb
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: exampass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examuser -d examdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - exam-network

  app:
    build:
      context: ./spring-app
    container_name: exam-spring-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/examdb
      SPRING_DATASOURCE_USERNAME: examuser
      SPRING_DATASOURCE_PASSWORD: exampass
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - exam-network

  nginx:
    image: nginx:1.27-alpine
    container_name: exam-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - exam-network

volumes:
  postgres-data:

networks:
  exam-network:
    driver: bridge
