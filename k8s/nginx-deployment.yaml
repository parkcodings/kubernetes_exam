apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-rolling-update
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nginx-rolling-update
  template:
    metadata:
      labels:
        app: nginx-rolling-update
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
